# Security headers
add_header X-Content-Type-Options nosniff;
add_header X-XSS-Protection "1; mode=block";
add_header X-Frame-Options "SAMEORIGIN";
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
#add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-hashes'; connect-src 'self' https://cognito-idp.us-east-1.amazonaws.com/; font-src 'self' https://fonts.gstatic.com/;";
