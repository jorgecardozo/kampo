<svg width="500" height="600" viewBox="0 0 500 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b3daff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5695ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2f6bff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c3bff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="600" fill="url(#bgGradient)"/>

  <!-- Warehouse shelves (isometric) -->
  <g filter="url(#shadow)">
    <!-- Left shelf -->
    <path d="M80 320 L80 240 L120 220 L120 300 Z" fill="#2f6bff" opacity="0.9"/>
    <path d="M80 240 L180 240 L220 220 L120 220 Z" fill="#5695ff"/>
    <path d="M180 240 L180 320 L120 300 L120 220 Z" fill="#0c3bff"/>

    <!-- Boxes on left shelf -->
    <rect x="90" y="265" width="35" height="30" fill="#85bfff" rx="2"/>
    <rect x="135" y="265" width="35" height="30" fill="#d5ecff" rx="2"/>

    <!-- Middle shelf -->
    <path d="M140 400 L140 320 L180 300 L180 380 Z" fill="#2f6bff" opacity="0.9"/>
    <path d="M140 320 L240 320 L280 300 L180 300 Z" fill="#5695ff"/>
    <path d="M240 320 L240 400 L180 380 L180 300 Z" fill="#0c3bff"/>

    <!-- Boxes on middle shelf -->
    <rect x="150" y="345" width="35" height="30" fill="#85bfff" rx="2"/>
    <rect x="195" y="345" width="35" height="30" fill="#d5ecff" rx="2"/>
    <rect x="150" y="305" width="35" height="30" fill="#b3daff" rx="2"/>

    <!-- Right shelf -->
    <path d="M200 360 L200 280 L240 260 L240 340 Z" fill="#2f6bff" opacity="0.9"/>
    <path d="M200 280 L300 280 L340 260 L240 260 Z" fill="#5695ff"/>
    <path d="M300 280 L300 360 L240 340 L240 260 Z" fill="#0c3bff"/>

    <!-- Boxes on right shelf -->
    <rect x="210" y="305" width="35" height="30" fill="#85bfff" rx="2"/>
    <rect x="255" y="305" width="35" height="30" fill="#d5ecff" rx="2"/>
  </g>

  <!-- Floating invoice/document -->
  <g filter="url(#shadow)" transform="translate(320, 140)">
    <rect x="0" y="0" width="140" height="180" fill="white" rx="8" stroke="#2f6bff" stroke-width="2"/>
    <!-- Header -->
    <rect x="10" y="10" width="120" height="30" fill="#e8f5ff" rx="4"/>
    <text x="70" y="30" font-family="Arial" font-size="12" fill="#2f6bff" text-anchor="middle" font-weight="bold">FACTURA</text>

    <!-- Lines representing text -->
    <line x1="15" y1="55" x2="125" y2="55" stroke="#b3daff" stroke-width="2"/>
    <line x1="15" y1="70" x2="100" y2="70" stroke="#d5ecff" stroke-width="2"/>
    <line x1="15" y1="85" x2="115" y2="85" stroke="#d5ecff" stroke-width="2"/>

    <!-- Table lines -->
    <rect x="10" y="100" width="120" height="50" fill="#e8f5ff" rx="4"/>
    <line x1="15" y1="115" x2="125" y2="115" stroke="#85bfff" stroke-width="1"/>
    <line x1="15" y1="130" x2="125" y2="130" stroke="#85bfff" stroke-width="1"/>

    <!-- Total section -->
    <rect x="10" y="160" width="120" height="15" fill="#2f6bff" rx="4"/>
    <text x="70" y="172" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">TOTAL</text>
  </g>

  <!-- Barcode scanner icon -->
  <g filter="url(#shadow)" transform="translate(100, 140)">
    <rect x="0" y="0" width="100" height="120" fill="white" rx="8" stroke="#2f6bff" stroke-width="2"/>
    <!-- Scanner lines -->
    <rect x="15" y="30" width="3" height="60" fill="#0c3bff"/>
    <rect x="25" y="30" width="5" height="60" fill="#2f6bff"/>
    <rect x="35" y="30" width="2" height="60" fill="#0c3bff"/>
    <rect x="42" y="30" width="6" height="60" fill="#5695ff"/>
    <rect x="52" y="30" width="4" height="60" fill="#2f6bff"/>
    <rect x="60" y="30" width="3" height="60" fill="#0c3bff"/>
    <rect x="68" y="30" width="5" height="60" fill="#2f6bff"/>
    <rect x="78" y="30" width="4" height="60" fill="#5695ff"/>

    <!-- Scan beam -->
    <line x1="10" y1="60" x2="90" y2="60" stroke="#2f6bff" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Chart/Analytics -->
  <g filter="url(#shadow)" transform="translate(240, 420)">
    <rect x="0" y="0" width="200" height="140" fill="white" rx="8" stroke="#2f6bff" stroke-width="2"/>

    <!-- Title -->
    <text x="100" y="20" font-family="Arial" font-size="12" fill="#2f6bff" text-anchor="middle" font-weight="bold">Estadísticas</text>

    <!-- Bar chart -->
    <rect x="20" y="90" width="25" height="30" fill="#5695ff" rx="2"/>
    <rect x="55" y="70" width="25" height="50" fill="#2f6bff" rx="2"/>
    <rect x="90" y="55" width="25" height="65" fill="#0c3bff" rx="2"/>
    <rect x="125" y="75" width="25" height="45" fill="#5695ff" rx="2"/>
    <rect x="160" y="60" width="25" height="60" fill="#2f6bff" rx="2"/>

    <!-- Axis -->
    <line x1="15" y1="125" x2="190" y2="125" stroke="#85bfff" stroke-width="2"/>
    <line x1="15" y1="35" x2="15" y2="125" stroke="#85bfff" stroke-width="2"/>
  </g>

  <!-- Shopping cart icon -->
  <g filter="url(#shadow)" transform="translate(50, 450)">
    <circle cx="30" cy="30" r="30" fill="#2f6bff"/>
    <!-- Cart body -->
    <path d="M18 20 L22 20 L26 32 L34 32" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M22 20 L38 20 L34 32 L26 32" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Wheels -->
    <circle cx="28" cy="36" r="2.5" fill="white"/>
    <circle cx="34" cy="36" r="2.5" fill="white"/>
    <!-- Items in cart -->
    <rect x="25" y="23" width="8" height="6" fill="white" opacity="0.8" rx="1"/>
  </g>

  <!-- Checklist icon -->
  <g filter="url(#shadow)" transform="translate(150, 480)">
    <rect x="0" y="0" width="80" height="100" fill="white" rx="6" stroke="#2f6bff" stroke-width="2"/>

    <!-- Checkmarks -->
    <circle cx="15" cy="20" r="5" fill="#2f6bff"/>
    <path d="M12 20 L14 22 L18 18" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>

    <circle cx="15" cy="40" r="5" fill="#2f6bff"/>
    <path d="M12 40 L14 42 L18 38" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>

    <circle cx="15" cy="60" r="5" fill="#5695ff"/>
    <path d="M12 60 L14 62 L18 58" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>

    <circle cx="15" cy="80" r="5" fill="#85bfff"/>

    <!-- Lines -->
    <line x1="25" y1="20" x2="70" y2="20" stroke="#d5ecff" stroke-width="2"/>
    <line x1="25" y1="40" x2="70" y2="40" stroke="#d5ecff" stroke-width="2"/>
    <line x1="25" y1="60" x2="70" y2="60" stroke="#d5ecff" stroke-width="2"/>
    <line x1="25" y1="80" x2="70" y2="80" stroke="#d5ecff" stroke-width="2"/>
  </g>

  <!-- Floating elements/particles -->
  <circle cx="420" cy="100" r="8" fill="#d5ecff" opacity="0.6"/>
  <circle cx="450" cy="200" r="6" fill="#e8f5ff" opacity="0.7"/>
  <circle cx="60" cy="100" r="10" fill="#b3daff" opacity="0.5"/>
  <circle cx="380" cy="500" r="7" fill="#d5ecff" opacity="0.6"/>
  <circle cx="430" cy="380" r="9" fill="#e8f5ff" opacity="0.5"/>

  <!-- Decorative lines -->
  <path d="M50 50 Q 100 80 150 60" stroke="#d5ecff" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M350 550 Q 400 520 450 540" stroke="#d5ecff" stroke-width="2" fill="none" opacity="0.4"/>
</svg>
