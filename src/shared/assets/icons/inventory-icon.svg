<svg width="130" height="130" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5695ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2f6bff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2f6bff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c3bff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="65" cy="65" r="60" fill="#e8f5ff"/>

  <!-- Isometric boxes stacked -->
  <!-- Bottom box -->
  <g>
    <path d="M40 75 L40 90 L65 105 L90 90 L90 75 L65 90 Z" fill="url(#boxGrad1)"/>
    <path d="M40 75 L65 60 L90 75 L65 90 Z" fill="#85bfff"/>
    <path d="M65 60 L65 90 L90 75 L90 75 L65 60 Z" fill="#5695ff"/>
  </g>

  <!-- Middle box -->
  <g>
    <path d="M40 55 L40 70 L65 85 L90 70 L90 55 L65 70 Z" fill="url(#boxGrad2)"/>
    <path d="M40 55 L65 40 L90 55 L65 70 Z" fill="#5695ff"/>
    <path d="M65 40 L65 70 L90 55 L90 55 L65 40 Z" fill="#2f6bff"/>
  </g>

  <!-- Top box -->
  <g>
    <path d="M40 35 L40 50 L65 65 L90 50 L90 35 L65 50 Z" fill="url(#boxGrad1)"/>
    <path d="M40 35 L65 20 L90 35 L65 50 Z" fill="#b3daff"/>
    <path d="M65 20 L65 50 L90 35 L90 35 L65 20 Z" fill="#85bfff"/>
  </g>

  <!-- Checkmark overlay -->
  <circle cx="95" cy="35" r="15" fill="#0c3bff"/>
  <path d="M88 35 L93 40 L102 31" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
